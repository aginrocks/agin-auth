name: Rust Formatting Check

on:
  pull_request:
    paths:
      - "**.rs"
      - "rustfmt.toml"
      - ".rustfmt.toml"
  push:
    branches: [master]
    paths:
      - "**.rs"
      - "rustfmt.toml"
      - ".rustfmt.toml"
jobs:
  fmt:
    name: Check rustfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run rustfmt
        run: cargo fmt --all -- --check
